AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Meridiano — endpoint para envío de columnas

Parameters:
  EditorialEmail:
    Type: String
    Description: Correo del equipo editorial que recibe las columnas
  FromEmail:
    Type: String
    Description: Remitente verificado en SES (ej. no-reply@meridiano.example)
  AllowedOrigin:
    Type: String
    Description: Origen permitido para CORS (ej. https://meridiano.example)
  GitHubToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: PAT de GitHub con permiso repo:contents (opcional)
  GitHubRepo:
    Type: String
    Default: ''
    Description: owner/repo (ej. coysegur-beep/meridiano)

Resources:
  SubmitColumnFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meridiano-submit-column
      Handler: index.handler
      Runtime: nodejs20.x
      CodeUri: ./
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          EDITORIAL_EMAIL: !Ref EditorialEmail
          FROM_EMAIL: !Ref FromEmail
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          GITHUB_TOKEN: !Ref GitHubToken
          GITHUB_REPO: !Ref GitHubRepo
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        Submit:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /submit
            Method: POST
        SubmitCors:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /submit
            Method: OPTIONS

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: [!Ref AllowedOrigin]
        AllowMethods: [POST, OPTIONS]
        AllowHeaders: [Content-Type]

Outputs:
  ApiEndpoint:
    Description: Endpoint para PUBLIC_SUBMIT_ENDPOINT en Astro
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/submit'
