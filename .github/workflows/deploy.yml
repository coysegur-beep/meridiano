name: Deploy Meridiano to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  # Ajusta a los IDs reales del stack de Meridiano (no los de atenasseguridadprivadaltda)
  S3_BUCKET: meridiano-portal
  CLOUDFRONT_DISTRIBUTION_ID: EF3W2M3T6B0ZO
  SITE_URL: https://dwliapwuypdk5.cloudfront.net

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        env:
          SITE_URL: ${{ env.SITE_URL }}
          PUBLIC_FINNHUB_KEY: ${{ secrets.PUBLIC_FINNHUB_KEY }}
          PUBLIC_SUBMIT_ENDPOINT: ${{ secrets.PUBLIC_SUBMIT_ENDPOINT }}
        run: npm run build

      - name: Build Pagefind search index
        run: npx pagefind --site dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets with long cache (1 year)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "robots.txt" \
            --exclude "llms.txt" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML with short cache
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "robots.txt" \
            --include "llms.txt" \
            --cache-control "public, max-age=300, s-maxage=3600" \
            --content-type-by-extension

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Ping Google Indexing (sitemap)
        run: |
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap-index.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=${{ env.SITE_URL }}/sitemap-index.xml" || true
